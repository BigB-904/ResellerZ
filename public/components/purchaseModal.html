<div
id="purchaseModal"
class="modal">

    <div class="modal-content purchase-modal">

        <div class="modal-header">

            <h2>

                New Purchase

            </h2>

            <button
            id="closePurchaseModal"
            class="close-button">

                ✕

            </button>

        </div>

        <hr>

        <!-- Supplier -->

        <div class="form-group">

            <label>

                Supplier

            </label>

            <select
            id="supplierSelect"
            class="input">

                <option value="">

                    Select Supplier

                </option>

            </select>

        </div>

        <!-- Notes -->

        <div class="form-group">

            <label>

                Notes

            </label>

            <textarea
            id="purchaseNotes"
            class="input"
            rows="3"
            placeholder="Optional purchase notes..."></textarea>

        </div>

        <hr>

        <h3>

            Add Item

        </h3>

        <div class="purchase-item-grid">

            <div>

                <label>

                    Product

                </label>

                <select
                id="productSelect"
                class="input">

                    <option value="">

                        Select Product

                    </option>

                </select>

            </div>

            <div>

                <label>

                    Quantity

                </label>

                <input
                id="quantity"
                class="input"
                type="number"
                min="1"
                value="1">

            </div>

            <div>

                <label>

                    Purchase Price

                </label>

                <input
                id="purchasePrice"
                class="input"
                type="number"
                min="0"
                value="0">

            </div>

            <div
            style="display:flex;
            align-items:flex-end;">

                <button
                id="addItemButton"
                class="btn btn-primary"
                style="width:100%;">

                    Add Item

                </button>

            </div>

        </div>

        <hr>

        <h3>

            Purchase Items

        </h3>

        <table class="table">

            <thead>

                <tr>

                    <th>

                        Product

                    </th>

                    <th>

                        Qty

                    </th>

                    <th>

                        Price

                    </th>

                    <th>

                        Total

                    </th>

                    <th>

                        Remove

                    </th>

                </tr>

            </thead>

            <tbody
            id="purchaseItemsBody">

                <tr>

                    <td
                    colspan="5"
                    style="text-align:center;">

                        No items added.

                    </td>

                </tr>

            </tbody>

        </table>

        <div class="purchase-summary">

            <h2>

                Grand Total

            </h2>

            <h1>

                ₨
                <span id="grandTotal">

                    0

                </span>

            </h1>

        </div>

        <div class="modal-buttons">

            <button
            id="savePurchaseButton"
            class="btn btn-primary">

                Save Purchase

            </button>

            <button
            id="cancelPurchaseButton"
            class="btn">

                Cancel

            </button>

        </div>

    </div>

</div>
