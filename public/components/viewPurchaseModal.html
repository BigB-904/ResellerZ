<div
id="viewPurchaseModal"
class="modal">

    <div
    class="modal-content"
    style="width:1100px;max-width:95%;">

        <h2>

            Purchase Details

        </h2>

        <div class="purchase-details">

            <p>

                <strong>Purchase ID :</strong>

                <span id="viewPurchaseID">

                    -

                </span>

            </p>

            <p>

                <strong>Supplier :</strong>

                <span id="viewSupplier">

                    -

                </span>

            </p>

            <p>

                <strong>Date :</strong>

                <span id="viewPurchaseDate">

                    -

                </span>

            </p>

            <p>

                <strong>Total :</strong>

                <span id="purchaseGrandTotal">

                    ₨ 0.00

                </span>

            </p>

        </div>

        <table class="table">

            <thead>

                <tr>

                    <th>Product</th>

                    <th>SKU</th>

                    <th>Quantity</th>

                    <th>Purchase Price</th>

                    <th>Total</th>

                </tr>

            </thead>

            <tbody
            id="purchaseDetailsBody">

            </tbody>

        </table>

        <div class="purchase-total">

            <h2>

                Grand Total :
                <span id="purchaseGrandTotalBottom">

                    ₨ 0.00

                </span>

            </h2>

        </div>

        <div class="modal-buttons">

            <button
            id="printPurchaseButton"
            class="btn btn-primary">

                Print

            </button>

            <button
            id="closeViewPurchaseModal"
            class="btn">

                Close

            </button>

        </div>

    </div>

</div>
