<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

ResellerZ | Products

</title>

<link
rel="stylesheet"
href="/css/base/global.css">

<link
rel="stylesheet"
href="/css/pages/dashboard.css">

<link
rel="stylesheet"
href="/css/pages/products.css">

<link
rel="stylesheet"
href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"/>

</head>

<body>

<div class="dashboard">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="logo">

            ResellerZ

        </div>

         <nav>

                <a href="/pages/dashboard/index.html">Dashboard</a>

                <a href="/pages/customers/index.html">Customers</a>

                <a href="/pages/suppliers/index.html">Suppliers</a>

                <a href="/pages/inventory/index.html">Inventory</a>

                <a href="/pages/purchases/index.html">Purchases</a>

                <a href="/pages/sales/index.html">Sales</a>

                <a href="/pages/invoices/index.html">Invoices</a>

                <a href="/pages/customers/index.html">Reports</a>

                <a href="/pages/customers/index.html">Users</a>

                <a href="/pages/customers/index.html">Settings</a>

            </nav>

    </aside>

    <!-- Main -->

    <main class="content">

        <header class="topbar">

            <h2>

                Products

            </h2>

            <button
            class="btn btn-primary"
            onclick="logout()">

                Logout

            </button>

        </header>

        <!-- Statistics -->

        <section class="cards">

            <div class="card">

                <h3>

                    Total Products

                </h3>

                <h1 id="totalProducts">

                    0

                </h1>

            </div>

            <div class="card">

                <h3>

                    Low Stock

                </h3>

                <h1 id="lowStock">

                    0

                </h1>

            </div>

            <div class="card">

                <h3>

                    Out Of Stock

                </h3>

                <h1 id="outOfStock">

                    0

                </h1>

            </div>

            <div class="card">

                <h3>

                    Inventory Value

                </h3>

                <h1 id="inventoryValue">

                    ₨ 0

                </h1>

            </div>

        </section>

        <section
        class="card"
        style="margin-top:30px;">

            <div class="toolbar">

                <input
                id="searchBox"
                class="input"
                placeholder="Search product...">

                <button
                id="addProductButton"
                class="btn btn-primary">

                    Add Product

                </button>

            </div>

            <table class="table">

                <thead>

                    <tr>

                        <th>ID</th>

                        <th>Name</th>

                        <th>SKU</th>

                        <th>Category</th>

                        <th>Brand</th>

                        <th>Price</th>

                        <th>Stock</th>

                        <th>Actions</th>

                    </tr>

                </thead>

                <tbody
                id="productTableBody">

                </tbody>

            </table>

        </section>

    </main>

</div>

<!-- Modal -->

<div
id="productModal"
class="modal">

    <div class="modal-content">

        <h2>

            Product

        </h2>

        <label>Product Name</label>

        <input
        id="productName"
        class="input">

        <label>SKU</label>

        <input
        id="sku"
        class="input">

        <label>Barcode</label>

        <input
        id="barcode"
        class="input">

        <label>Category</label>

        <input
        id="category"
        class="input">

        <label>Brand</label>

        <input
        id="brand"
        class="input">

        <label>Purchase Price</label>

        <input
        id="purchasePrice"
        class="input"
        type="number">

        <label>Sale Price</label>

        <input
        id="salePrice"
        class="input"
        type="number">

        <label>Stock</label>

        <input
        id="stock"
        class="input"
        type="number">

        <label>Minimum Stock</label>

        <input
        id="minimumStock"
        class="input"
        type="number">

        <label>Description</label>

        <textarea
        id="description"
        class="input"></textarea>

        <div class="modal-buttons">

            <button
            id="saveProduct"
            class="btn btn-primary">

                Save

            </button>

            <button
            id="closeModal"
            class="btn">

                Cancel

            </button>

        </div>

    </div>

</div>

<div id="confirmModal" class="modal">

    <div class="modal-content">

        <h2>

            Delete Product

        </h2>

        <p>

            Are you sure you want to delete this product?

        </p>

        <div class="modal-buttons">

            <button
            id="confirmDelete"
            class="btn btn-primary">

                Yes, Delete

            </button>

            <button
            id="cancelDelete"
            class="btn">

                Cancel

            </button>

        </div>

    </div>

</div>

<script src="/js/api.js"></script>

<script src="/js/auth.js"></script>

<script src="/js/pages/products.js"></script>

</body>

</html>
