<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ResellerZ | Sales</title>

    <link rel="stylesheet" href="/css/base/global.css">
    <link rel="stylesheet" href="/css/pages/dashboard.css">
    <link rel="stylesheet" href="/css/pages/sales.css">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"/>

</head>

<body>

<div class="dashboard">

    <!-- Sidebar -->
    <aside class="sidebar">

        <div class="logo">ResellerZ</div>

        <nav>

            <a href="/pages/dashboard/index.html">Dashboard</a>
            <a href="/pages/customers/index.html">Customers</a>
            <a href="/pages/products/index.html">Products</a>
            <a href="/pages/suppliers/index.html">Suppliers</a>
            <a href="/pages/inventory/index.html">Inventory</a>
            <a href="/pages/purchases/index.html">Purchases</a>

            <a class="active" href="/pages/sales/index.html">Sales</a>

            <a href="/pages/invoices/index.html">Invoices</a>
            <a>Reports</a>
            <a>Users</a>
            <a>Settings</a>

        </nav>

    </aside>

    <!-- Main -->
    <main class="content">

        <header class="topbar">

            <h2>Sales</h2>

            <button class="btn btn-primary" onclick="logout()">Logout</button>

        </header>

        <!-- Stats -->
        <section class="cards">

            <div class="card">
                <h3>Total Sales</h3>
                <h1 id="totalSales">0</h1>
            </div>

            <div class="card">
                <h3>Today Sales</h3>
                <h1 id="todaySales">0</h1>
            </div>

            <div class="card">
                <h3>Total Revenue</h3>
                <h1 id="totalRevenue">₨ 0.00</h1>
            </div>

        </section>

        <!-- Table -->
        <section class="card" style="margin-top:30px;">

            <div class="toolbar">

                <input id="searchBox" class="input" placeholder="Search sales...">

                <button id="newSaleButton" class="btn btn-primary">New Sale</button>

            </div>

            <table class="table">

                <thead>

                    <tr>

                        <th>ID</th>
                        <th>Date</th>
                        <th>Customer</th>
                        <th>Total</th>
                        <th>Actions</th>

                    </tr>

                </thead>

                <tbody id="salesTableBody"></tbody>

            </table>

        </section>

    </main>

</div>

<!-- Sale Modal -->
<div id="saleModal" class="modal">

    <div class="modal-content" style="width:1000px;max-width:95%;">

        <h2>New Sale</h2>

        <label>Customer</label>
        <select id="customerSelect" class="input">
            <option value="">Select Customer</option>
        </select>

        <label>Notes</label>
        <textarea id="saleNotes" class="input"></textarea>

        <hr>

        <div class="toolbar">
            <button id="addSaleItemButton" class="btn btn-primary">Add Item</button>
        </div>

        <table class="table">

            <thead>

                <tr>
                    <th style="width:35%">Product</th>
                    <th>Qty</th>
                    <th>Sale Price</th>
                    <th>Total</th>
                    <th>Action</th>
                </tr>

            </thead>

            <tbody id="saleItemsBody"></tbody>

        </table>

        <div class="purchase-total">

            <h2>
                Grand Total:
                <span id="saleGrandTotal">₨ 0.00</span>
            </h2>

        </div>

        <div class="modal-buttons">

            <button id="saveSaleButton" class="btn btn-primary">Save Sale</button>
            <button id="closeSaleModal" class="btn">Cancel</button>

        </div>

    </div>

</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/pages/sales.js"></script>

</body>

</html>
