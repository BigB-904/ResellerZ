<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Customers | ResellerZ</title>

    <link rel="stylesheet" href="/css/base/global.css">
    <link rel="stylesheet" href="/css/pages/dashboard.css">
    <link rel="stylesheet" href="/css/pages/customers.css">

</head>

<body>

    <div class="dashboard">

        <aside class="sidebar">

            <div class="logo">

                ResellerZ

            </div>

            <nav>

                <a href="/pages/dashboard/index.html">Dashboard</a>

                <a href="/pages/customers/index.html">Customers</a>

                <a href="/pages/suppliers/index.html">Suppliers</a>

                <a href="/pages/inventory/index.html">Inventory</a>

                <a href="/pages/purchases/index.html">Purchases</a>

                <a href="/pages/sales/index.html">Sales</a>

                <a href="/pages/invoices/index.html">Invoices</a>

                <a href="/pages/customers/index.html">Reports</a>

                <a href="/pages/customers/index.html">Users</a>

                <a href="/pages/customers/index.html">Settings</a>

            </nav>

        </aside>

        <main class="content">

            <header class="topbar">

                <h2>Customers</h2>

                <button id="addCustomerButton" class="btn btn-primary">

                    Add Customer

                </button>

            </header>

            <div class="card">

                <input id="searchBox" class="input" placeholder="Search customer...">

            </div>

            <br>

            <div class="card">

                <table class="table">

                    <thead>

                        <tr>

                            <th>ID</th>
                            <th>Name</th>
                            <th>Phone</th>
                            <th>Email</th>
                            <th>City</th>
                            <th>Balance</th>
                            <th>Actions</th>

                        </tr>

                    </thead>

                    <tbody id="customerTableBody">

                    </tbody>

                </table>

            </div>

        </main>

    </div>

    <!-- Modal -->

    <div id="customerModal" class="modal">

        <div class="modal-content">

            <h2>Add Customer</h2>

            <label for="firstName">First Name *</label>
            <input id="firstName" class="input" type="text">

            <label for="lastName">Last Name *</label>
            <input id="lastName" class="input" type="text">

            <label for="phone">Phone *</label>
            <input id="phone" class="input" type="text">

            <label for="email">Email</label>
            <input id="email" class="input" type="email">

            <label for="address">Address</label>
            <input id="address" class="input" type="text">

            <label for="city">City</label>
            <input id="city" class="input" type="text">

            <div class="modal-buttons">

                <button id="closeModal" class="btn">

                    Cancel

                </button>

                <button id="saveCustomer" class="btn btn-primary">

                    Save Customer

                </button>

            </div>

        </div>

    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/pages/customers.js"></script>

</body>

</html>
