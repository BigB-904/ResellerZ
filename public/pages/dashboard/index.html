<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>ResellerZ Dashboard</title>

<link rel="stylesheet" href="/css/base/global.css">

<link rel="stylesheet" href="/css/pages/dashboard.css">

<link
rel="stylesheet"
href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"/>

<link
rel="stylesheet"
href="/css/dashboard.css">

</head>

<body>

<div class="dashboard">

    <aside class="sidebar">

        <div class="logo">

            ResellerZ

        </div>

        <nav>

                <a href="/pages/dashboard/index.html">Dashboard</a>

                <a href="/pages/customers/index.html">Customers</a>

                <a href="/pages/suppliers/index.html">Suppliers</a>

                <a href="/pages/inventory/index.html">Inventory</a>

                <a href="/pages/purchases/index.html">Purchases</a>

                <a href="/pages/sales/index.html">Sales</a>

                <a href="/pages/invoices/index.html">Invoices</a>

                <a href="/pages/customers/index.html">Reports</a>

                <a href="/pages/customers/index.html">Users</a>

                <a href="/pages/customers/index.html">Settings</a>

            </nav>
    </aside>

    <main class="content">

        <header class="topbar">

            <h2>

                Dashboard

            </h2>

            <button
            class="btn btn-primary"
            onclick="logout()">

                Logout

            </button>

        </header>

        <section class="cards">

            <div class="card">

                <h3>Today's Sales</h3>

                <h1>₨ 0</h1>

            </div>

            <div class="card">

                <h3>Orders</h3>

                <h1>0</h1>

            </div>

            <div class="card">

                <h3>Products</h3>

                <h1>0</h1>

            </div>

            <div class="card">

                <h3>Profit</h3>

                <h1>₨ 0</h1>

            </div>

        </section>

        <section
        class="card"
        style="margin-top:30px;">

            <h2>

                Recent Activity

            </h2>

            <br>

            No recent activity.

        </section>

    </main>

</div>

<script src="/js/auth.js"></script>

</body>

</html>
